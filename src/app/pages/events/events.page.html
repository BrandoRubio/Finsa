<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button autoHide="false">
        <ion-button size="large" (click)="ToggleMenu()">
          <ion-icon name="menu-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-menu-button>
    </ion-buttons>
    <ion-title>
      <img src="../../assets/images/logo.webp" style="height: 45px;" />
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-breadcrumbs>
    <ion-breadcrumb [routerLink]="['/plant', plantId]" [state]="{ name: plantName }">
      {{ plantName || 'Planta' }}
    </ion-breadcrumb>
    <ion-breadcrumb>Eventos</ion-breadcrumb>
  </ion-breadcrumbs>
  
</ion-content>
